<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BH Finder</title>
    <style>
        body {
            background-image: url(image/bg.jpg);
        }
        .navbar {
            background-position: 0%;
            padding: 25px;
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
        }
        .nav-links {
            list-style: none;
            display: flex;
            justify-content: center;
        }
        .nav-links li {
            margin: 0 15px;
        }
        .nav-links a {
            text-decoration: none;
            color: black;
            font-size: 18px;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            text-decoration: underline;
            color: #25705a; /* Hover color */
        }
        .nav-links a:active {
            color: #ff6600; /* Color when clicked */
        }
        .map-container {
            width: 100%;
            height: calc(100vh - 60px);
            max-width: 100vw;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .header {
            text-align: center;
            padding: 50px;
        }
        .header h1 {
            font-size: 36px;
            color: #25705a;
        }
        .header p {
            font-size: 18px;
            margin-top: 10px;
        }
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px 0;
        }
        .search-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .search-bar {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
        }
        .search-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #25705a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .search-button:hover {
            background-color: gray;
        }
        .error-message {
            color: red;
            font-weight: bold;
            margin-top: 10px;
            display: none; /* Initially hidden */
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="map.html">Map</a></li>
            <li><a href="boarding-house.php">Boarding House Information</a></li>
            <li><a href="login.php">Dashboard</a></li>
        </ul>
    </nav>

    <!-- Header -->
    <header class="header" id="home">
        <h1>House Master</h1>
        <p>Your guide to finding the best boarding houses in Maloro, Tangub City.</p>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="search-section">
            <form onsubmit="return redirectSearch();">
                <input type="text" id="search_query" placeholder="Search for boarding houses..." class="search-bar" />
                <button type="submit" class="search-button">Search</button>
                <div id="error-message" class="error-message">
                    Boarding house not found. Try: Jomai BH, Decina BH, or Labuguen BH.
                </div>
            </form>
        </div>
    </main>

    <!-- JavaScript to handle redirection -->
    <script>
        function redirectSearch() {
            const query = document.getElementById("search_query").value.toLowerCase().trim();
            const errorMessage = document.getElementById("error-message");

            // List of available boarding houses
            const bhMap = {
                "jomai bh": "jomai.php",
                "decina bh": "decina.php",
                "labuguen bh": "labuguen.php"
            };

            if (bhMap[query]) {
                errorMessage.style.display = "none";
                window.location.href = bhMap[query];
            } else {
                errorMessage.style.display = "block";
            }

            return false; // Prevent form submission
        }
    </script>
</body>
</html>
